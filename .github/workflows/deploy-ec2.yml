name: Deploy Docker to EC2

on:
  push:
    branches: ["master", "python-server"]

env:
  AWS_REGION: ap-southeast-2
  ECR_REPOSITORY: bot
  ECS_SERVICE: bot-service
  ECS_CLUSTER: bot-cluster
  ECS_TASK_DEFINITION: .aws/task-definition.json
  CONTAINER_NAME: bot

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx (recommended for multi-platform builds)
        uses: docker/setup-buildx-action@v4

      - name: Setup SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF
            set -e

            echo "🚀 Pulling latest code..."

            if [ -d ~/bot ]; then
              cd ~/bot
              git fetch origin
              git reset --hard origin/master
            else
              git clone https://github.com/${GITHUB_REPOSITORY}.git ~/bot
              cd ~/bot
            fi

            echo "🐳 Deploy with Docker Compose..."
            docker compose down || true
            docker compose up -d --build

            echo "🧹 Cleanup..."
            docker system prune -af
          EOF
